<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;

    --bg3: #1e1e1e;
    --border: #2a2a2a;
    --border2: #333;

    --accent2: #15803d;
    --accent-bg: rgba(22,163,74,0.1);

    --sans: 'IBM Plex Sans', sans-serif;
  }

  [data-theme="light"] {
    --bg: #f5f5f5;
    --bg2: #ffffff;
    --bg3: #ebebeb;
    --border: #d4d4d4;
    --border2: #b8b8b8;
    --text: #171717;
    --text2: #525252;
    --text3: #a3a3a3;
    --accent: #16a34a;
    --accent2: #15803d;
    --accent-bg: rgba(22,163,74,0.12);
    --accent-bg2: rgba(22,163,74,0.22);
    --accent-bg3: rgba(22,163,74,0.06);
    --danger: #dc2626;
    --danger-bg: rgba(220,38,38,0.1);
    --warn: #d97706;
    --info: #2563eb;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg2);
  }

  .logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--bg);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .badge {
    margin-left: auto;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr 0px;
    height: calc(100vh - 57px);
    transition: grid-template-columns 0.25s ease;
    overflow: hidden;
  }

  .layout.panel-open {
    grid-template-columns: 320px 1fr 360px;
  }

  .autodetect-panel {
    border-left: 0px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    width: 100%;
    transition: border-left-width 0.25s;
  }

  .layout.panel-open .autodetect-panel {
    border-left: 1px solid var(--border);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .rules-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .rules-list::-webkit-scrollbar { width: 4px; }
  .rules-list::-webkit-scrollbar-track { background: transparent; }
  .rules-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .rule-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
  }

  .rule-item.regex-mode { border-left: 3px solid var(--warn); }
  .rule-item.plain-mode { border-left: 3px solid var(--info); }

  .rule-find {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .rule-find span {
    color: var(--text);
    font-weight: 500;
  }

  .rule-replace {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .rule-del {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    font-family: var(--mono);
    margin-top: 1px;
  }
  .rule-del:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

  .presets-section {
    border-top: 1px solid var(--border);
    padding: 12px;
  }

  .presets-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .presets-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }

  .preset-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg3); }

  .add-form {
    border-top: 1px solid var(--border);
    padding: 12px;
  }

  .add-form-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .form-row { margin-bottom: 6px; }

  .form-row label {
    display: block;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 3px;
    font-family: var(--mono);
  }

  .form-row input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-row input:focus { border-color: var(--accent); }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .toggle-row label { font-size: 12px; color: var(--text2); margin: 0; font-family: var(--sans); cursor: pointer; }

  .toggle {
    width: 32px; height: 18px;
    background: var(--border2);
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent2); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(14px); }

  .btn-add {
    width: 100%;
    background: var(--accent-bg);
    border: 1px solid var(--accent2);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    padding: 7px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-add:hover { background: var(--accent-bg2); }

  .main {
    display: grid;
    grid-template-rows: 1fr auto 1fr;
    overflow: hidden;
  }

  .pane {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .pane-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    flex-shrink: 0;
  }

  .pane-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .pane-actions {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }

  .btn-sm {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--border2); color: var(--text); }
  .btn-sm.primary { border-color: var(--accent2); color: var(--accent); background: var(--accent-bg); }
  .btn-sm.primary:hover { background: var(--accent-bg2); }

  textarea.editor {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    border: none;
    padding: 16px;
    resize: none;
    outline: none;
    width: 100%;
  }
  textarea.editor::placeholder { color: var(--text3); }

  .output-area {
    flex: 1;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 16px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    background: var(--bg);
    color: var(--text);
  }
  .output-area::-webkit-scrollbar { width: 4px; }
  .output-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .divider {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg2);
    flex-shrink: 0;
  }

  .run-btn {
    background: var(--accent);
    color: #ffffff;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.03em;
  }
  .run-btn:hover { opacity: 0.85; }

  .stats {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  .stats .hit { color: var(--accent); }

  .empty-state {
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
    font-style: italic;
    padding: 16px;
  }

  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--bg3);
    border: 1px solid var(--accent2);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 8px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .type-badge {
    font-size: 9px;
    font-family: var(--mono);
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
  }
  .type-regex { background: rgba(251,191,36,0.15); color: var(--warn); }
  .type-plain { background: rgba(96,165,250,0.15); color: var(--info); }

  /* Profiles */
  .profile-section {
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
    background: var(--bg2);
    flex-shrink: 0;
  }
  .profile-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
  }
  .profile-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .profile-actions { display: flex; gap: 4px; }
  .profile-list { display: flex; flex-direction: column; gap: 3px; }
  .profile-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .profile-load-btn {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 5px;
    cursor: pointer;
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .profile-load-btn:hover { border-color: var(--accent); color: var(--accent); }
  .profile-del-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 5px;
    border-radius: 4px;
    font-family: var(--mono);
    flex-shrink: 0;
  }
  .profile-del-btn:hover { color: var(--danger); background: var(--danger-bg); }
  .profile-empty {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    font-style: italic;
    padding: 2px 0;
  }

  /* Rule reorder buttons */
  .reorder-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 11px;
    padding: 1px 3px;
    border-radius: 3px;
    line-height: 1;
    display: block;
  }
  .reorder-btn:hover { color: var(--accent); background: var(--accent-bg); }
  .reorder-btn:disabled { opacity: 0.2; cursor: default; }

  /* Regex preview */
  .regex-preview {
    margin-top: 5px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    min-height: 18px;
    line-height: 1.4;
    word-break: break-all;
  }
  .regex-preview.ok { color: var(--accent); }
  .regex-preview.err { color: var(--danger); }
  .regex-preview.warn { color: var(--warn); }

  /* Diff tooltip */
  .anon-mark {
    background: rgba(22,163,74,0.15);
    color: var(--accent);
    border: 1px solid rgba(22,163,74,0.3);
    border-radius: 3px;
    padding: 0 2px;
    font-weight: 500;
    cursor: help;
    position: relative;
  }
  .anon-mark:hover::after {
    content: attr(data-original);
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    pointer-events: none;
    z-index: 20;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  /* ── Responsive / Mobile ─────────────────────────────── */
  @media (max-width: 768px) {
    body { grid-template-rows: auto 1fr; }

    /* Header — kompaktný, len podstatné */
    header { padding: 0 12px; height: 48px; gap: 8px; }
    header h1 { font-size: 13px; }
    .badge { display: none; }
    .header-desktop-btns { display: none !important; }
    .hamburger { display: flex !important; }

    /* Layout — jeden stĺpec */
    .layout {
      grid-template-columns: 1fr !important;
      grid-template-rows: 1fr;
      height: calc(100dvh - 48px);
      overflow: hidden;
    }
    .layout.panel-open { grid-template-columns: 1fr !important; }

    /* Main — flex column, polia pod sebou */
    .main {
      grid-column: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    /* Vstupné pole — pevná výška */
    .main .pane:first-child {
      flex: 0 0 35%;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* Divider */
    .main .divider {
      flex-shrink: 0;
    }

    /* Výstupné pole — zvyšok priestoru */
    .main .pane:last-child {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* Textareas a output vyplnia celý pane */
    .main textarea.editor,
    .main .output-area {
      flex: 1;
      min-height: 0;
    }

    /* Pane headers — kompaktnejšie */
    .pane-header { padding: 7px 12px; }
    .pane-label { font-size: 10px; }
    .pane-actions { gap: 4px; }
    .pane-actions .btn-sm { font-size: 11px; padding: 5px 8px; }

    /* Textareas */
    textarea.editor { font-size: 13px; padding: 12px; }
    .output-area { font-size: 13px; padding: 12px; }

    /* Divider — kompaktnejší */
    .divider { padding: 7px 12px; gap: 8px; }
    .run-btn { padding: 8px 16px; font-size: 13px; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }

    /* Sidebar — slide-in drawer */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: min(320px, 92vw);
      height: 100dvh;
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      box-shadow: 4px 0 24px rgba(0,0,0,0.18);
      padding-bottom: 0 !important;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar.open { transform: translateX(0); }
    /* Rules list scrolls, footer stays pinned */
    .sidebar .rules-list { flex: 1; overflow-y: auto; }

    /* Téma + jazyk v sidebari na mobile */
    .mobile-sidebar-footer {
      display: flex !important;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    /* Backdrop */
    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 199;
    }
    .sidebar-backdrop.visible { display: block; }

    /* Autodetect panel — fullscreen overlay */
    .autodetect-panel {
      position: fixed !important;
      top: 0; right: 0;
      width: 100vw !important;
      height: 100dvh;
      z-index: 200;
      border-left: none !important;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }
    .layout.panel-open .autodetect-panel {
      transform: translateX(0);
    }

    /* Formulárové polia — väčšie pre dotyk */
    .btn-add { padding: 10px; font-size: 13px; }
    .form-row input { padding: 9px 10px; font-size: 13px; }

    /* Rule karty — trochu priestoru */
    .rule-item { padding: 10px; }

    /* Safe area pre spodok — iOS Safari bottom bar */
    .output-area { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  }

  /* Hamburger — skrytý na desktope */
  .hamburger {
    display: none;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 34px; height: 34px;
    cursor: pointer;
    flex-shrink: 0;
    color: var(--text2);
    font-size: 17px;
    transition: all 0.15s;
  }
  .hamburger:hover { border-color: var(--accent); color: var(--accent); }

  /* Téma + jazyk sekcia v sidebari — viditeľná len na mobile */
  .mobile-sidebar-footer {

  /* Sidebar close button */

    line-height: 1;

  @media (max-width: 768px) {

<body>

<header>
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
  <div class="logo">A</div>
  <h1 data-i18n="title">Log Anonymizátor</h1>
  <span class="badge" data-i18n="badge">100% lokálne · žiadne odosielanie dát</span>

function t(key, ...args) {
  const val = TRANSLATIONS[currentLang][key];
  return typeof val === 'function' ? val(...args) : (val ?? key);
}

function setLang(lang) {
  currentLang = lang;
  // Update desktop lang buttons
  document.getElementById('lang-sk').style.borderColor = lang === 'sk' ? 'var(--accent)' : 'var(--border)';
  document.getElementById('lang-sk').style.color = lang === 'sk' ? 'var(--accent)' : 'var(--text3)';
  document.getElementById('lang-en').style.borderColor = lang === 'en' ? 'var(--accent)' : 'var(--border)';
  document.getElementById('lang-en').style.color = lang === 'en' ? 'var(--accent)' : 'var(--text3)';
  // Update mobile sidebar lang buttons
  const skm = document.getElementById('lang-sk-m');
  const enm = document.getElementById('lang-en-m');
  if (skm) { skm.style.borderColor = lang === 'sk' ? 'var(--accent)' : 'var(--border)'; skm.style.color = lang === 'sk' ? 'var(--accent)' : 'var(--text3)'; skm.style.fontWeight = lang === 'sk' ? '500' : 'normal'; }
  if (enm) { enm.style.borderColor = lang === 'en' ? 'var(--accent)' : 'var(--border)'; enm.style.color = lang === 'en' ? 'var(--accent)' : 'var(--text3)'; enm.style.fontWeight = lang === 'en' ? '500' : 'normal'; }

  const HTML_KEYS = new Set(['kwDesc']);

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (TRANSLATIONS[lang][key] === undefined) return;
    if (HTML_KEYS.has(key)) {
      const desc = t(key);
      const example = t(key + 'Example');
      el.innerHTML = desc + '<br><span style="color:var(--text2);">' + example + '</span>';
    } else {
      el.textContent = t(key);
    }
  });
  document.querySelectorAll('[data-i18n-btn]').forEach(el => {
    const key = el.getAttribute('data-i18n-btn');
    if (TRANSLATIONS[lang][key] !== undefined) el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    if (TRANSLATIONS[lang][key] !== undefined) el.placeholder = t(key);
  });
  document.title = t('title');
  renderRules();
  renderProfiles();
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const isLight = theme === 'light';
  const pairs = [['theme-light','theme-dark'],['theme-light-m','theme-dark-m']];
  pairs.forEach(([lightId, darkId]) => {
    const l = document.getElementById(lightId);
    const d = document.getElementById(darkId);
    if (l) { l.style.borderColor = isLight ? 'var(--accent)' : 'var(--border)'; l.style.color = isLight ? 'var(--accent)' : 'var(--text3)'; l.style.fontWeight = isLight ? '500' : 'normal'; }
    if (d) { d.style.borderColor = !isLight ? 'var(--accent)' : 'var(--border)'; d.style.color = !isLight ? 'var(--accent)' : 'var(--text3)'; d.style.fontWeight = !isLight ? '500' : 'normal'; }
  });
}

function toggleCase() {
  caseSensitive = !caseSensitive;
  const btn = document.getElementById('case-toggle');
  btn.className = 'toggle' + (caseSensitive ? ' on' : '');
  updateRegexPreview();
}

function renderRules() {
  const list = document.getElementById('rules-list');
  document.getElementById('rule-count').textContent = rules.length;
  if (!rules.length) {
    list.innerHTML = `<div class="empty-state">${t('rulesEmpty')}</div>`;
    return;

  list.innerHTML = rules.map((r, i) => `
    <div class="rule-item ${r.regex ? 'regex-mode' : 'plain-mode'}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;">
        <div style="display:flex;flex-direction:column;gap:1px;flex-shrink:0;margin-top:1px;">
          <button class="reorder-btn" onclick="moveRule(${i},-1)" ${i===0?'disabled':''}>▲</button>
          <button class="reorder-btn" onclick="moveRule(${i},1)" ${i===rules.length-1?'disabled':''}>▼</button>
        </div>
        <div style="flex:1;min-width:0;">
          <div class="rule-find">
            ${r.label
              ? escHtml(r.label) + '<span class="type-badge ' + (r.regex ? 'type-regex' : 'type-plain') + '" style="margin-left:4px;">' + (r.regex ? 'regex' : 'plain') + '</span>'
              : t('findLabel') + '<span>' + escHtml(r.find) + '</span><span class="type-badge ' + (r.regex ? 'type-regex' : 'type-plain') + '" style="margin-left:4px;">' + (r.regex ? 'regex' : 'plain') + '</span>'
            }
          </div>
          ${r.label ? `<div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:2px;white-space:normal;word-break:break-all;">${escHtml(r.find)}</div>` : ''}
          <div class="rule-replace">-> ${escHtml(r.replace)} <span style="font-size:10px;font-family:var(--mono);color:var(--text3);">${!r.regex ? (r.caseSensitive ? '· case' : '· icase') : ''}</span></div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
            <button onclick="toggleNumbered(${i})" style="background:${r.numbered ? 'var(--accent)' : 'var(--bg3)'};border:1px solid ${r.numbered ? 'var(--accent)' : 'var(--border2)'};color:${r.numbered ? '#fff' : 'var(--text3)'};font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 10px;border-radius:4px;cursor:pointer;transition:all 0.15s;letter-spacing:0.03em;">
              ${r.numbered ? t('numberedZap') : t('numberedVyp')}
            </button>
            ${r.numbered ? `<span style="font-size:10px;font-family:var(--mono);color:var(--text2);">${escHtml(r.replace.replace(']','_1]'))}, ${escHtml(r.replace.replace(']','_2]'))}…</span>` : ''}
          </div>
        </div>
        <button class="rule-del" onclick="deleteRule(${i})" title="${t('deleteTitle')}" style="flex-shrink:0;position:static;">×</button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function deleteRule(i) {
  rules.splice(i, 1);
  renderRules();
}

function addPreset(key) {
  const p = PRESETS[key];
  if (rules.some(r => r.replace === p.replace && r.regex === p.regex)) {
    toast(t('presetExists'));
    return;
  }
  rules.push({ find: p.pattern, replace: p.replace, regex: p.regex, label: p.label });
  renderRules();
  if (window.innerWidth <= 768) closeSidebar();
  toast(t('presetAdded') + p.replace);
}

function moveRule(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= rules.length) return;
  [rules[i], rules[j]] = [rules[j], rules[i]];
  renderRules();
}

function clearAllRules() {
  if (!rules.length) return;
  if (!confirm(t('clearConfirm'))) return;
  rules = [];
  renderRules();
}

// ── Profiles (localStorage) ──────────────────────────────
function getProfiles() {
  try { return JSON.parse(localStorage.getItem('log-anon-profiles') || '{}'); } catch { return {}; }
}
function saveProfiles(p) {
  try { localStorage.setItem('log-anon-profiles', JSON.stringify(p)); } catch {}
}

function saveProfile() {
  if (!rules.length) { toast(t('profileNoRules')); return; }
  const name = prompt(t('profileNamePrompt'));
  if (!name || !name.trim()) return;
  const profiles = getProfiles();
  if (profiles[name] && !confirm(t('profileExists'))) return;
  profiles[name] = { rules: JSON.parse(JSON.stringify(rules)), savedAt: new Date().toISOString() };
  saveProfiles(profiles);
  renderProfiles();
  toast(t('profileSaved') + name);
}

function loadProfile(name) {
  const profiles = getProfiles();
  if (!profiles[name]) return;
  const loaded = profiles[name].rules;
  if (!Array.isArray(loaded) || loaded.length === 0) {
    toast('Profile data is invalid or empty');
    return;
  }
  const valid = loaded.filter(r =>
    r && typeof r === 'object' &&
    typeof r.find === 'string' && r.find.trim() !== '' &&
    typeof r.replace === 'string' && r.replace.trim() !== ''
  );
  rules = valid;
  renderRules();
  toast(t('profileLoaded') + name);
}

function deleteProfile(name) {
  if (!confirm(`${t('deleteTitle')}: "${name}"?`)) return;
  const profiles = getProfiles();
  delete profiles[name];
  saveProfiles(profiles);
  renderProfiles();
  toast(t('profileDeleted'));
}

function renderProfiles() {
  const list = document.getElementById('profile-list');
  const profiles = getProfiles();
  const names = Object.keys(profiles);
  if (!names.length) {
    list.innerHTML = `<div class="profile-empty">${t('profileEmpty')}</div>`;
    return;
  }
  list.innerHTML = '';
  names.forEach(name => {
    const item = document.createElement('div');
    item.className = 'profile-item';

    const loadBtn = document.createElement('button');
    loadBtn.className = 'profile-load-btn';
    loadBtn.textContent = name;
    loadBtn.title = name;
    loadBtn.onclick = () => loadProfile(name);

    const delBtn = document.createElement('button');
    delBtn.className = 'profile-del-btn';
    delBtn.textContent = '×';
    delBtn.title = t('deleteTitle');
    delBtn.onclick = () => deleteProfile(name);

    item.appendChild(loadBtn);
    item.appendChild(delBtn);
    list.appendChild(item);
  });
}

function exportRules() {
  if (!rules.length) { toast(t('profileNoRules')); return; }
  const json = JSON.stringify({ version: 1, rules }, null, 2);
  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'log-anon-rules-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function importRules() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const imported = Array.isArray(data) ? data : Array.isArray(data.rules) ? data.rules : null;
        if (!imported) throw new Error('Expected an array of rules or { rules: [...] }');
        const valid = imported.filter(r =>
          r && typeof r === 'object' &&
          typeof r.find === 'string' && r.find.trim() !== '' &&
          typeof r.replace === 'string' && r.replace.trim() !== ''
        );
        if (valid.length === 0) throw new Error('No valid rules found in file');
        const skipped = imported.length - valid.length;
        rules = valid;
        renderRules();
        toast(t('profileLoaded') + file.name + (skipped ? ` (${skipped} skipped)` : ''));
      } catch(e) {
        toast('Import failed: ' + e.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Regex live preview ───────────────────────────────────
function updateRegexPreview() {
  const preview = document.getElementById('regex-preview');
  const findVal = document.getElementById('new-find').value;
  if (!findVal) { preview.textContent = ''; preview.className = 'regex-preview'; return; }
  const text = document.getElementById('input').value;
  if (regexMode) {
    try {
      const rx = new RegExp(findVal, 'g');
      if (!text) { preview.textContent = t('regexPreviewNoText'); preview.className = 'regex-preview warn'; return; }
      const matches = text.match(rx) || [];
      if (matches.length) {
        const examples = [...new Set(matches)].slice(0,3).join(', ');
        preview.textContent = t('regexPreviewMatches', matches.length) + ': ' + examples;
        preview.className = 'regex-preview ok';
      } else {
        preview.textContent = t('regexPreviewNoMatches');
        preview.className = 'regex-preview warn';
      }
    } catch {
      preview.textContent = t('regexPreviewInvalid');
      preview.className = 'regex-preview err';
    }
  } else {
    if (!text) { preview.textContent = t('regexPreviewNoText'); preview.className = 'regex-preview warn'; return; }
    const flags = caseSensitive ? 'g' : 'gi';
    const escaped = findVal.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const matches = text.match(new RegExp(escaped, flags)) || [];
    if (matches.length) {
      preview.textContent = t('regexPreviewMatches', matches.length);
      preview.className = 'regex-preview ok';
    } else {
      preview.textContent = t('regexPreviewNoMatches');
      preview.className = 'regex-preview warn';
    }
  }
}

function toggleRegex() {
  regexMode = !regexMode;
  const btn = document.getElementById('regex-toggle');
  const badge = document.getElementById('mode-badge');
  btn.className = 'toggle' + (regexMode ? ' on' : '');
  badge.className = 'type-badge ' + (regexMode ? 'type-regex' : 'type-plain');
  badge.textContent = regexMode ? 'regex' : 'plain';
  updateRegexPreview();
}

function addCustomRule() {
  const find = document.getElementById('new-find').value.trim();
  const replace = document.getElementById('new-replace').value.trim();
  if (!find || !replace) { toast(t('fillBoth')); return; }
  if (regexMode) {
    try { new RegExp(find); } catch(e) { toast(t('invalidRegex') + e.message); return; }
  }
  const caseLbl = caseSensitive ? ' (case)' : ' (icase)';
  const modeLbl = regexMode ? ' [regex]' : '';
  const label = '"' + find.slice(0, 30) + (find.length > 30 ? '…' : '') + '" → ' + replace + caseLbl + modeLbl;
  rules.push({ find, replace, regex: regexMode, caseSensitive, label });
  renderRules();
  document.getElementById('new-find').value = '';
  document.getElementById('new-replace').value = '';
  document.getElementById('regex-preview').textContent = '';
  document.getElementById('regex-preview').className = 'regex-preview';
  if (window.innerWidth <= 768) closeSidebar();
  toast(t('ruleAdded'));
}

function toggleNumbered(i) {
  rules[i].numbered = !rules[i].numbered;
  renderRules();
}

function anonymize() {
  if (document.querySelector('.layout').classList.contains('panel-open') && window._adDetected) {
    window.confirmAutoDetect();
  } else {
    closeAutoPanel();
  }
  let text = document.getElementById('input').value;
  if (!text.trim()) { toast(t('inputEmpty')); return; }
  let totalHits = 0;
  let workText = text;
  const usedTokens = new Set();
  // Map: replacement token → [original values] for diff tooltip
  const diffMap = {};

  rules.forEach(r => {
    try {
      let rx;
      if (r.regex) {
        rx = new RegExp(r.find, 'g');
      } else {
        const safeFind = r.find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        rx = new RegExp(safeFind, r.caseSensitive ? 'g' : 'gi');
      }
      if (r.numbered) {
        const valueMap = {};
        let counter = 1;
        const base = r.replace.endsWith(']') ? r.replace.slice(0, -1) : r.replace;
        workText = workText.replace(rx, match => {
          totalHits++;
          const key = (!r.regex && !r.caseSensitive) ? match.toLowerCase() : match;
          if (!(key in valueMap)) {
            valueMap[key] = base + '_' + counter + (r.replace.endsWith(']') ? ']' : '');
            counter++;
          }
          const token = valueMap[key];
          if (!diffMap[token]) diffMap[token] = new Set();
          diffMap[token].add(match);
          return token;
        });
        Object.values(valueMap).forEach(v => usedTokens.add(v));
      } else {
        const originals = [];
        workText = workText.replace(rx, match => {
          totalHits++;
          originals.push(match);
          return r.replace;
        });
        if (originals.length) {
          usedTokens.add(r.replace);
          if (!diffMap[r.replace]) diffMap[r.replace] = new Set();
          originals.forEach(o => diffMap[r.replace].add(o));
        }
      }
    } catch(e) { console.error('Rule error:', JSON.stringify(r), e.message); }
  });

  const out = document.getElementById('output');
  const escaped = workText
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  let highlighted = escaped;
  if (usedTokens.size) {
    const tokenPattern = [...usedTokens]
      .map(tok => tok.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
      .join('|');
    highlighted = escaped.replace(new RegExp('(' + tokenPattern + ')', 'g'), (match) => {
      const origSet = diffMap[match];
      const origText = origSet ? [...origSet].slice(0,3).join(', ') : '';
      const tooltip = origText ? escHtml(t('originalLabel') + origText) : '';
      return `<span class="anon-mark" data-original="${tooltip}">${escHtml(match)}</span>`;
    });
  }

  out.innerHTML = highlighted;

  const s = document.getElementById('stats');
  if (totalHits > 0) {
    s.innerHTML = `<span class="hit">${totalHits}${t('replacements')}</span>`;
  } else {
    s.innerHTML = `<span style="color:var(--warn)">${t('noMatches')}</span>`;
  }
}

function autoDetect() {
  const text = document.getElementById('input').value;
  if (!text.trim()) { toast(t('noText')); return; }

  const detected = [];
  Object.keys(PRESETS).forEach(key => {
    const p = PRESETS[key];
    try {
      const rx = new RegExp(p.pattern, 'g');
      const matches = [...new Set(text.match(rx) || [])];
      if (matches.length && !rules.some(r => r.replace === p.replace)) {
        detected.push({ key, label: p.label, replace: p.replace, pattern: p.pattern, matches });
      }
    } catch(e) { console.warn('autoDetect preset error:', key, e.message); }
  });

  showAutoDetectPanel(detected);
}

// ── Sidebar (mobile drawer) ──────────────────────────────
function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  if (sidebar.classList.contains('open')) {
    closeSidebar();
  } else {
    sidebar.classList.add('open');
    document.getElementById('sidebar-backdrop').classList.add('visible');
  }
}

function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('visible');
}

function openAutoPanel() {
  document.querySelector('.layout').classList.add('panel-open');
  closeSidebar();
}

function closeAutoPanel() {
  document.querySelector('.layout').classList.remove('panel-open');
}

function showAutoDetectPanel(detected) {
  window._adDetected = detected;
  window._adPending = {};
  detected.forEach(d => { window._adPending[d.key] = true; });

  window.toggleDetected = function(key) {
    window._adPending[key] = !window._adPending[key];
    renderAutoPanel();
  };

  window.confirmAutoDetect = function() {
    let added = 0;
    (window._adDetected || []).forEach(d => {
      if (window._adPending[d.key]) {
        rules.push({ find: d.pattern, replace: d.replace, regex: true, label: d.label });
        added++;
      }
    });
    window._adDetected = null;
    window._adPending = {};
    renderRules();
    closeAutoPanel();
    toast(added ? t('autoAdded') + added + t('autoAddedSuffix') : t('autoNoneSelected'));
  };

  renderAutoPanel();
  openAutoPanel();
}

function renderAutoPanel() {
  const panel = document.getElementById('autodetect-panel');
  if (!panel) return;
  const detected = window._adDetected || [];
  const pendingMap = window._adPending || {};
  const activeKeys = detected.filter(d => pendingMap[d.key]);

  if (!detected.length) {
    panel.innerHTML = `
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <span style="font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;">${t('autoTitle')}</span>
        <button onclick="closeAutoPanel()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;font-family:var(--mono);" title="${t('closeTitle')}">×</button>
      </div>
      <div style="padding:24px;color:var(--text3);font-family:var(--mono);font-size:12px;text-align:center;margin-top:32px;">
        ${t('autoNone')}<br><br>
        <span style="color:var(--text2);">${t('autoNoneHint')}</span>
      </div>`;
    return;
  }

  const rows = detected.map(d => {
    const active = pendingMap[d.key];
    const exampleStr = d.matches.slice(0,3).join(', ') + (d.matches.length > 3 ? ` +${d.matches.length-3}` : '');
    return `
      <div style="border:1px solid ${active ? 'var(--accent2)' : 'var(--border)'};border-radius:8px;padding:12px;margin-bottom:8px;background:${active ? 'var(--accent-bg3)' : 'var(--bg3)'};transition:all 0.2s;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span style="font-size:12px;font-weight:500;color:${active ? 'var(--accent)' : 'var(--text3)'};">${escHtml(d.replace)}</span>
              <span style="font-size:10px;font-family:var(--mono);background:rgba(96,165,250,0.15);color:var(--info);padding:1px 5px;border-radius:3px;">${escHtml(d.label)}</span>
            </div>
            <div style="font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:4px;">
              ${t('autoFound')}<span style="color:var(--text2);word-break:break-all;">${escHtml(exampleStr)}</span>
            </div>
            <div style="font-size:10px;font-family:var(--mono);color:var(--text3);">
              ${t('occurrences', d.matches.length)}
            </div>
          </div>
          <button onclick="toggleDetected('${d.key}')" style="flex-shrink:0;background:${active ? 'var(--danger-bg)' : 'var(--accent-bg)'};border:1px solid ${active ? 'var(--danger)' : 'var(--accent2)'};color:${active ? 'var(--danger)' : 'var(--accent)'};font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;">
            ${active ? t('autoRemove') : t('autoAdd')}
          </button>
        </div>
      </div>`;
  }).join('');

  panel.innerHTML = `
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div>
        <div style="font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;">${t('autoTitle')}</div>
        <div style="font-size:11px;font-family:var(--mono);color:var(--accent);margin-top:2px;">${activeKeys.length}${t('autoSelected')}${detected.length}${t('autoSelectedSuffix')}</div>
      </div>
      <button onclick="closeAutoPanel()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;font-family:var(--mono);" title="${t('closeTitle')}">×</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:12px;">
      <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:10px;">${t('autoHint')}</div>
      ${rows}
    </div>
    <div style="padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;">
      <button onclick="confirmAutoDetect()" style="flex:1;background:var(--accent-bg);border:1px solid var(--accent2);color:var(--accent);font-family:var(--mono);font-size:12px;font-weight:500;padding:8px;border-radius:6px;cursor:pointer;">
        ${t('autoConfirm')}${activeKeys.length}${t('autoConfirmSuffix')}
      </button>
      <button onclick="closeAutoPanel()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--mono);font-size:12px;padding:8px 14px;border-radius:6px;cursor:pointer;">${t('autoCancel')}</button>
    </div>`;
}

async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('input').value = text;
    toast(t('clipboardPasted'));
  } catch(e) {
    toast(t('clipboardFail'));
  }
}

function clearInput() {
  document.getElementById('input').value = '';
  document.getElementById('output').innerHTML = '';
  document.getElementById('stats').innerHTML = '';
}

async function copyOutput() {
  const outEl = document.getElementById('output');
  if (!outEl.textContent.trim()) { toast(t('outputEmpty')); return; }
  // Get plain text - innerText handles span tags correctly
  const text = outEl.innerText;
  try {
    await navigator.clipboard.writeText(text);
    toast(t('copied'));
  } catch(e) {
    toast(t('copyFail'));
  }
}

function downloadOutput() {
  const text = document.getElementById('output').innerText;
  if (!text) { toast(t('outputEmpty')); return; }
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'anonymized-' + new Date().toISOString().slice(0,19).replace(/[T:]/g,'-') + '.txt';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') anonymize();
});

renderRules();
renderProfiles();
setTheme('light');
// Auto-detect language from browser settings
const browserLang = navigator.language || navigator.userLanguage || 'en';
setLang(browserLang.startsWith('sk') ? 'sk' : 'en');
</script>
